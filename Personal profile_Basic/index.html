<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>My Personal Profile</h1>
</header>

<main>

    <section>
        <h2>About Me</h2>

        <img src="https://img.magnific.com/free-photo/celebration-labour-day-with-3d-cartoon-portrait-working-woman_23-2151306563.jpg?semt=ais_hybrid&w=740&q=80" alt="Profile Picture">

        <p>
            Hello! My name is Abarna Priyadarshini N from Chennai. I completed my Bachelor's degree in Information Technology from Sri Sairam Engineering College.
        </p>
    </section>

    <section>
        <h2>Contact Me</h2>

        <form>

            <label for="name">Name</label>
            <input type="text" id="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="message">Message</label>
            <textarea id="message" rows="4" required></textarea>

            <button type="submit">Send</button>

        </form>
    </section>

</main>

<footer>
    <p>&copy; 2026 My Profile</p>
</footer>

</body>
</html>
